# 生产环境覆盖配置
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
version: '3.8'

services:
  postgres:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    restart: always
    environment:
      NODE_ENV: production
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    restart: always
    profiles: []   # 覆盖 profiles，使 nginx 在生产环境默认启动
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
