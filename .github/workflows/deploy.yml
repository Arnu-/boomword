name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy BoomWord
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 1800s
          script: |
            set -e

            echo "========================================="
            echo "  BoomWord Production Deploy"
            echo "  $(date '+%Y-%m-%d %H:%M:%S')"
            echo "========================================="

            # 进入项目目录
            cd /opt/boomword

            # 拉取最新代码
            echo "[1/5] Pulling latest code..."
            git pull origin master

            # 确保生产环境 .env 存在（首次部署后不覆盖）
            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found! Please create it first."
              exit 1
            fi

            # 构建并重启服务（零停机滚动更新）
            echo "[2/5] Building Docker images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production build --no-cache

            echo "[3/5] Starting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            echo "[4/5] Waiting for services to be healthy..."
            sleep 10

            echo "[5/5] Checking service status..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production ps

            # 清理旧镜像
            docker image prune -f

            echo "========================================="
            echo "  Deploy completed successfully!"
            echo "========================================="
